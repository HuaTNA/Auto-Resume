# Copy this file to cloud-run.env.yaml and replace every placeholder.
# cloud-run.env.yaml is ignored by git.
DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/postgres?sslmode=require"
JWT_SECRET: "replace-with-a-long-random-value"
CRON_SECRET: "replace-with-a-different-long-random-value"
ANTHROPIC_API_KEY: "sk-ant-replace-me"
ADZUNA_APP_ID: "replace-me"
ADZUNA_APP_KEY: "replace-me"
PRODUCTION: "true"
COOKIE_SECURE: "true"
COOKIE_SAMESITE: "lax"
VERCEL_FRONTEND_URL: "https://your-project.vercel.app"
CORS_ORIGINS: "https://your-project.vercel.app"
OUTPUT_DIR: "/tmp/auto-resume-output"

